version: '3.8'

services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: sistema3d_app
    environment:
      DATABASE_URL:                        "${DATABASE_URL}"
      AUTH_SECRET:                         "${AUTH_SECRET}"
      NEXT_PUBLIC_APP_URL:                 "https://app.ykaromarques.com"
      AUTH_TRUST_HOST:                     "true"
      REDIS_URL:                           "redis://:${REDIS_PASSWORD}@sistema3d_redis:6379"
      MINIO_ENDPOINT:                      "sistema3d_minio"
      MINIO_PORT:                          "9000"
      MINIO_ACCESS_KEY:                    "${MINIO_ACCESS_KEY}"
      MINIO_SECRET_KEY:                    "${MINIO_SECRET_KEY}"
      MINIO_BUCKET:                        "sistema3d"
      MINIO_USE_SSL:                       "false"
      STRIPE_SECRET_KEY:                   "${STRIPE_SECRET_KEY}"
      STRIPE_WEBHOOK_SECRET:               "${STRIPE_WEBHOOK_SECRET}"
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:  "${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}"
      EVOLUTION_API_URL:                   "${EVOLUTION_API_URL}"
      EVOLUTION_API_KEY:                   "${EVOLUTION_API_KEY}"
      RESEND_API_KEY:                      "${RESEND_API_KEY}"
      EMAIL_FROM:                          "${EMAIL_FROM}"
    networks:
      - YkaroNET
      - default
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=YkaroNET"
        - "traefik.http.routers.sistema3d.rule=Host(`app.ykaromarques.com`)"
        - "traefik.http.routers.sistema3d.entrypoints=websecure"
        - "traefik.http.routers.sistema3d.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.sistema3d.loadbalancer.server.port=3000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       "${POSTGRES_DB}"
      POSTGRES_USER:     "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - sistema3d_postgres_data:/var/lib/postgresql/data
    networks:
      - default
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  sistema3d_redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - sistema3d_redis_data:/data
    networks:
      - default
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  sistema3d_minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     "${MINIO_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY}"
    volumes:
      - sistema3d_minio_data:/data
    networks:
      - default
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

networks:
  YkaroNET:
    external: true

volumes:
  sistema3d_postgres_data:
  sistema3d_redis_data:
  sistema3d_minio_data:
